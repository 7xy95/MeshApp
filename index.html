<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mesh Wallet</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #162633;
            font-variant-numeric: tabular-nums;
            color: #dfe6ed;
        }
        input {
            background-color: #999ca8;
            font-family: monospace;
            border-radius: 0;
            border: none;
        }
        .page {
            width: 100vw;
            height: 100vh;
            font-family: monospace;
            display: flex;
            min-height: 0;
        }
        .logInPanel {
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        .mainPanel {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: monospace;
        }
        .panel {
            background-color: #151e29;
            border-radius: 3px;
            font-size: 16px;
            position: relative;
            padding: 15px;
            margin: 4px 0;
        }
        .panel p {
            margin: 8px 0;
        }
        .left {
            width: 350px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .left .panel {
            flex: 1;
            margin-top: 12px;
            margin-left: 12px;
        }
        .right .panel {
            flex: 1;
            margin: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .right {
            flex: 1;
            height: 100%;
            display: flex;
            min-height: 0;
        }
        .btn {
            margin-top: 30px;
            background-color: #151e29;
            color: #d6d7e1;
            border: none;
            padding: 8px 18px;
            border-radius: 2px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #0b1117;
            transform: scale(1.025);
        }
        .topBar {
            padding: 12px 16px 0 16px;
            box-sizing: border-box;
        }
        .label {
            text-align: left;
        }
        .value {
            text-align: left;
        }
        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
        }
        hr {
            height: 1px;
            border: none;
            background-color: rgb(54 60 78 / 0.72);
        }
        .input {
            border: 3px solid #151c23;
            background-color: #151e29;
            color: #c6d0dc;
        }
        input:focus {
            outline: none;
            border: 3px solid #0b1117;
        }
        .miningHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .popup {
            font-family: monospace;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgb(0 0 0 / 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .popupBox {
            width: 400px;
            height: 300px;
            background-color: #162633;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            position: relative;
        }
        .popupBoxLeft {
            align-items: flex-start;
            gap: 10px;
            padding-left: 20px;
        }
        .contactItem {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 6px;
        }
        .smallBtn {
            font-size: 14px;
            padding: 6px 6px;
            margin: 0 0 0 20px;
            background-color: #162633;
        }
        .smallBtn:hover {
            background-color: #162633;
            transform: scale(1.4);
        }
        .contactList {
            display: grid;
            position: relative;
        }
        .history {
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .historyItem {
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-template-rows: auto auto;
            column-gap: 4px;
            row-gap: 4px;
            align-items: center;
            margin: 0 0 30px;
        }
        .historyItem p {
            margin: 0;
        }
        .iconH {
            grid-column: 1;
            grid-row: 1 / 3;
        }
        .timeH {
            grid-column: 2;
            grid-row: 1;
        }
        .changeH {
            grid-column: 3;
            grid-row: 1;
            text-align: right;
        }
        .infoH {
            grid-column: 2 / 4;
            grid-row: 2;
            word-break: break-all;
        }
        .history::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

                <p class="info">

                <p class="info">

                <p class="info">

            </div>
            <div class="panel" style="margin-bottom: 12px">

                    <p style="margin: 0">Mining</p>

                </div>
                <label style="display: flex">

                <hr>
                <p class="info">

                <p class="info">

                    <span class="label"></span>

            </div>
        </div>
        <div class="right">
            <div class="panel">
                <p>History</p>
                <button class="btn" onclick="openContactPopup()" style="margin-top: 0; background-color: #2b3853">Manage Contacts</button>
                <hr>
                <div class="history" id="history"></div>
            </div>
        </div>
    </div>
</div>
<div class="popup" style="display: none" id="tx">
    <div class="popupBox">
        <button class="btn" onclick="closePopup()" style="font-size: 32px; margin-top: 0; background-color: #2b3853; position: absolute; top: 10px; right: 10px">×</button>
<!--        <p id="popupTitle"></p>-->
        <input class="input" id="addressInput" placeholder="Enter Receiver's Address..." style="margin-top: 100px; width: 300px">

        <input class="input" id="contactAddress" placeholder="Enter address to save as contact..." style="width: 330px">
        <input class="input" id="contactName" placeholder="Enter name..." style="width: 330px; margin-top: 10px">

        <div class="contactList" id="contactList"></div>

</div>
<script src="gpuMiner.js"></script>
<script>
    const APP_VERSION = "v1.0.5"
    function initContacts() {
        if (localStorage.getItem("contacts") === null) {localStorage.setItem("contacts", JSON.stringify([]))}
        else {
            let contacts = JSON.parse(localStorage.getItem("contacts"))
            for (let contact of contacts) {
                document.getElementById("contactList").innerHTML += `
                    <div class="contactItem">
                        <span>${contact[0]}: ${contact[1]}</span>
                        <button class="btn smallBtn" onclick="removeContact('${contact[0]}')">×</button>
                    </div>
                `
            }
        }
    }

    let privateKey = ""
    let publicKey = ""
    let address = ""

    let difficultyCache = [230]
    let balancesCache = {}
    let nonceCache = new Set()
    function cacheBlock(block) {
        let index = block.indexOf(",")
        let txs = split_(block.slice(index+1))
        let i = -1
        for (let tx of txs) {
            i++
            if (tx.startsWith("SYSTEM|")) {
                let [, to, amount,] = tx.split("|")
                amount = Number(amount)
                if (i === 0) {balancesCache[to] = (balancesCache[to]||0) + amount + getMinerRewards(txs)}
                else {balancesCache[to] = (balancesCache[to]||0) + amount}
            }
            else {
                tx = tx.split("||")[0]
                if (tx.startsWith("MSG|")) {
                    let [, from, , amount, nonce] = tx.split("|")
                    amount = Number(amount)
                    balancesCache[from] = (balancesCache[from]||0) - amount
                    nonceCache.add(`${from}|${nonce}`)
                }
                else {
                    let [from, to, amount, nonce] = tx.split("|")
                    amount = Number(amount)
                    balancesCache[from] = (balancesCache[from]||0) - amount
                    balancesCache[to] = (balancesCache[to]||0) + amount - getFee(amount)
                    nonceCache.add(`${from}|${nonce}`)
                }
            }
        }
    }

    const crypto = require("crypto")
    const { secp256k1 } = require("@noble/curves/secp256k1.js")

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms))
    }

    function sha256(data) {
        return crypto.createHash("sha256").update(data).digest()
    }
    function hash160(data) {
        return crypto.createHash("ripemd160").update(sha256(data)).digest()
    }
    function seedToAddress(seedText) {
        privateKey = sha256(sha256(Buffer.from(String(seedText), "utf-8")))
        publicKey = Buffer.from(secp256k1.getPublicKey(privateKey, true))
        address = hash160(publicKey).toString("hex")
    }
    function split_(text) {
        let start = Date.now()
        text = text.trim()
        let result = []
        let current = ""
        let nestedList = 0
        const startIndex = text.indexOf("[")
        text = text.slice(startIndex+1).replaceAll(" ", "").replaceAll("'", "").replaceAll('"', "")
        for (let c=0; c<text.length; c++) {
            let currentChar = text[c]
            let nextChar = text[c+1]
            if (currentChar === "," && nextChar === "[") {
                nestedList++
                current += currentChar
                continue
            }
            if (currentChar === "," && nestedList === 0) {
                result.push(current.trim())
                current = ""
                continue
            }
            if (currentChar === "]" && nestedList === 0) {
                result.push(current.trim())
                continue
            }
            if (currentChar === "]") {
                current += currentChar
                nestedList--
                continue
            }
            current += currentChar
        }
        return result.filter(x => x !== "")
    }
    function getNextNonce(address) {
        let nonce = 0
        let [from, n] = ["", ""]
        for (let block of blocks) {
            let index = block.indexOf(",")
            let txs = block.slice(index+1)
            txs = split_(txs)
            for (let tx of txs) {
                if (!tx.startsWith("SYSTEM|")) {
                    if (tx.startsWith("MSG|")) {[, from, , ,n] = tx.split("||")[0].split("|")}
                    else {[from, , ,n] = tx.split("||")[0].split("|")}
                    if (from === address) {nonce = Math.max(nonce, Number(n))}
                }
            }
        }
        for (let tx of mempool) {
            if (tx.startsWith("SYSTEM|")) {continue}
            if (tx.startsWith("MSG|")) {[, from, , ,n] = tx.split("||")[0].split("|")}
            else {[from, , ,n] = tx.split("||")[0].split("|")}
            if (from === address) {nonce = Math.max(nonce, Number(n))}
        }
        return nonce + 1
    }
    function getMinerRewards(txs) {
        let total = 0
        for (let tx of txs) {
            if (tx.startsWith("MSG|") || tx.startsWith("SYSTEM|")) {continue}
            total += getFee(Number(tx.split("||")[0].split("|")[2]))
        }
        return total
    }
    function getSpendableBalance(address, ignoreTx="") {
        let vBalance = 0
        for (let block of blocks) {
            let index = block.indexOf(",")
            block = block.slice(index+1)
            let txs = split_(block)
            let i = -1
            for (let tx of txs) {
                i++
                if (tx.startsWith("SYSTEM|")) {
                    let parts = tx.split("|")
                    if (parts[1] === address) {
                        vBalance += Number(parts[2])
                        if (i === 0) {vBalance += getMinerRewards(txs)}
                    }
                }
                else {
                    tx = tx.split("||")[0]
                    if (tx.startsWith("MSG|")) {
                        let [, from, , amount, ,] = tx.split("|")
                        if (from === address) {vBalance -= Number(amount)}
                        continue
                    }
                    let [from, to, amount,] = tx.split("|")
                    if (from === address) {vBalance -= Number(amount)}
                    if (to === address) {vBalance += Number(amount) - getFee(Number(amount))}
                }
            }
        }
        for (let tx of mempool) {
            if (tx === ignoreTx) {continue}
            let from = ""; let amount = 0
            tx = tx.split("||")[0]
            if (tx.startsWith("MSG|")) {[, from, , amount, ,] = tx.split("|")}
            else {[from, , amount,] = tx.split("|")}
            amount = Number(amount)
            if (from === address) {vBalance -= amount}
        }
        return vBalance
    }
    function getBalance(address) {
        let vBalance = 0
        for (let block of blocks) {
            let index = block.indexOf(",")
            block = block.slice(index+1)
            let txs = split_(block)
            let i = -1
            for (let tx of txs) {
                i++
                if (tx.startsWith("SYSTEM|")) {
                    let parts = tx.split("|")
                    if (parts[1] === address) {
                        vBalance += Number(parts[2])
                        if (i === 0) {vBalance += getMinerRewards(txs)}
                    }
                }
                else {
                    tx = tx.split("||")[0]
                    if (tx.startsWith("MSG|")) {
                        let [, from, , amount, ,] = tx.split("|")
                        if (from === address) {vBalance -= Number(amount)}
                        continue
                    }
                    let [from, to, amount,] = tx.split("|")
                    if (from === address) {vBalance -= Number(amount)}
                    if (to === address) {vBalance += Number(amount) - getFee(Number(amount))}
                }
            }
        }
        let balance = vBalance
        for (let tx of mempool) {
            tx = tx.split("||")[0]
            if (tx.startsWith("MSG|")) {
                let [, from, , amount, ,] = tx.split("|")
                if (from === address) {balance -= Number(amount)}
                continue
            }
            let [from, to, amount,] = tx.split("|")
            if (from === address) {balance -= Number(amount)}
            if (to === address) {balance += Number(amount) - getFee(Number(amount))}
        }
        return [vBalance, balance]
    }
    function getDifficultyFromTs(prevTs, nextTs) {
        const TARGET = 300
        let gap = nextTs - prevTs
        let diff = (gap-TARGET)/TARGET
        diff = Math.max(Math.min(diff, 0.3), -0.3)
        return Math.round(diff*100)/100
    }
    function getDifficultyFromTs2(prevTs, nextTs) {
        const TARGET = 300
        let avg = (nextTs - prevTs)/5
        let diff = (avg-TARGET)/TARGET
        diff = Math.max(Math.min(diff, 0.3), -0.3)
        return Math.round(diff*100)/100
    }
    function getDifficultyFromTs3(prevTs, nextTs) {
        const TARGET = 300
        let avg = (nextTs - prevTs)/25
        let diff = Math.log2(avg/TARGET)
        diff = Math.max(Math.min(diff, 0.5), -0.5)
        return Math.round(diff*100)/100
    }
    function getDifficulty(blockIndex) {
        const bits = getDifficultyBits(blockIndex)
        const int = Math.floor(bits)
        const frac = bits - int
        const precision = 52
        const scaled = BigInt(Math.floor(Math.pow(2, frac) * Math.pow(2, precision)))

        return scaled << BigInt(int - precision);
    }
    function getTs(block) {
        let header = block.split(",")[0]
        return Number(header.split("|")[2])
    }
    function getDifficultyBits(blockIndex) {
        if (difficultyCache[blockIndex] !== undefined) {return difficultyCache[blockIndex]}
        for (let i=difficultyCache.length; i<=blockIndex; i++) {
            if (i === 1) {difficultyCache[1] = 230; continue}
            const j = i-1
            let change = 0
            if (j <= 155) {change = getDifficultyFromTs(getTs(blocks[j - 1]), getTs(blocks[j]))}
            else if (j <= 7680) {change = getDifficultyFromTs2(getTs(blocks[j - 5]), getTs(blocks[j]))}
            else {change = getDifficultyFromTs3(getTs(blocks[j - 25]), getTs(blocks[j]))}
            difficultyCache[i] = difficultyCache[i-1] + change
        }
        return difficultyCache[blockIndex]
    }
    function getBlockReward(blockIndex) {
        if (blockIndex < 5_000) return 10000
        if (blockIndex < 15_000) return 5000
        if (blockIndex < 35_000) return 2500
        if (blockIndex < 75_000) return 1250
        if (blockIndex < 155_000) return 625
        if (blockIndex < 315_000) return 313
        if (blockIndex < 635_000) return 156
        if (blockIndex < 1_275_000) return 78
        if (blockIndex < 2_555_000) return 39
        if (blockIndex < 5_115_000) return 20
        if (blockIndex < 10_235_000) return 10
        if (blockIndex < 20_475_000) return 5
        if (blockIndex < 40_955_000) return 2
        else return 1
    }
    function getFee(amount) {
        if (amount > 10) {return Math.max(10, Math.ceil(amount*0.01))}
        else {return amount}
    }
    function parseAddr(address) {
        let contacts = JSON.parse(localStorage.getItem("contacts"))
        for (let contact of contacts) {
            if (contact[0] === address) {return contact[1]}
        }
        return address
    }
    function parseContact(address) {
        let contacts = JSON.parse(localStorage.getItem("contacts"))
        for (let contact of contacts) {
            if (contact[1] === address) {return contact[0]}
        }
        return address
    }

    let forkCase = false
    let mine = false
    let stop = false
    let useGpu = false
    let totalHashes = 0
    let totalHashesFound = 0
    let lastSeen = Date.now()
    let hashesAtLastSeen = 0
    let id = 0
    let latestVersion = ""
    let mempool = []
    let blocks = []
    const url = "https://roman-expanding-alias-talent.trycloudflare.com/"
    async function send(message, nodeId) {
        while (true) {
            try {
                console.log("sending")
                await fetch(url + "sendMessage", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        toId: nodeId,
                        fromId: id,
                        message: message
                    })
                })
                break
            }
            catch (error) {console.log(error); await sleep(100)}
        }
    }
    async function getLatestVersion() {
        let response = await fetch("https://api.github.com/repos/7xy95/MeshApp/releases/latest")
        response = await response.json()
        return response.tag_name
    }
    async function deleteMsg(rowId) {
        try {
            await fetch(url + "deleteMessageRow", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({rowId: rowId})
            })
        }
        catch (error) {console.log(error)}
    }
    async function read(timeout=5) {
        try {
            let response = await fetch(url + `nextMessage?id=${id}&timeout=${timeout}`)
            response = await response.json()
            return [response.message, response.senderId, response.rowId]
        }
        catch (error) {console.log(error); return ["noResponse", -1, null]}
    }
    async function getIds() {
        while (true) {
            try {
                let response = await fetch(url + "allIds")
                let data = await response.json()
                return data.ids
            }
            catch (error) {await sleep(1500)}
        }
    }
    async function newId() {
        let response = await fetch(url + "newId")
        let data = await response.json()
        return data.id
    }

                    if (i % 100 === 0) {
                        infoText.innerText = `Verifying blocks... ${i+1}/${blocks_.length}`
                        await new Promise(requestAnimationFrame)
                    }
                    blocks.push(block)
                    cacheBlock(block)
                }
            }
            await deleteMsg(rowId)
            if (!correct) {continue}
            infoText.innerText = "Getting mempool..."
            await send("getMempool", ids[index])
            while (true) {
                let [message, senderId, rowId] = await read()
                console.log(message)
                if (!message.startsWith("r:getMempool:") || senderId !== ids[index]) {
                    await deleteMsg(rowId)
                    continue
                }
                let mempool_ = message.slice(13)
                if (mempool_ !== ""){
                    mempool_ = split_(mempool_)
                    for (let tx=0; tx<mempool_.length; tx++) {
                        if (mempool_[tx].startsWith("MSG")) {
                            if (verifyMsg(mempool_[tx])) {mempool.push(mempool_[tx])}
                        }
                        else if (verifyTx(mempool_[tx])) {mempool.push(mempool_[tx])}
                    }
                    await deleteMsg(rowId)
                }
                break
            }
            break
        }
        lastSeen = Date.now()
    }

    function verifyTx(tx_, checkMempool=true) {
        try {
            let [tx, pubKey, sig] = tx_.split("||")
            pubKey = String(pubKey); sig = String(sig); tx = String(tx)
            pubKey = new Uint8Array(Buffer.from(pubKey, "hex"))
            sig = new Uint8Array(Buffer.from(sig, "hex"))
            let parts = tx.split("|")
            if (parts.length !== 4) {return false}
            let [from, to, amount, nonce] = parts
            amount = Number(amount); nonce = Number(nonce)
            if (amount < 1) {return false}
            if (checkMempool && nonce < getNextNonce(from)) {return false}
            let txHash = sha256(Buffer.from(tx, "utf-8"))
            if (!secp256k1.verify(sig, txHash, pubKey, {prehash: false, format: "der"})) {return false}
            if (from !== hash160(pubKey).toString("hex")) {return false}
            if (checkMempool && amount > getSpendableBalance(from, tx_)) {return false}
            return true
        }
        catch (error) {
            console.log(error)
            return false
        }
    }
    function verifyMsg(msg, checkMempool=true) {
        try {
            let [tx, pubKey, sig] = msg.split("||")
            pubKey = String(pubKey); sig = String(sig); tx = String(tx)
            pubKey = Buffer.from(pubKey, "hex")
            sig = Buffer.from(sig, "hex")
            let parts = tx.split("|")
            if (parts.length !== 6) {return false}
            let [kind, from, to, amount, nonce, message] = parts
            if (kind !== "MSG") {return false}
            amount = Number(amount); nonce = Number(nonce)
            message = Buffer.from(message, "hex")
            if (amount !== 1000) {return false}
            let txHash = sha256(Buffer.from(tx, "utf-8"))
            if (checkMempool && nonce < getNextNonce(from)) {return false}
            if (!secp256k1.verify(sig, txHash, pubKey, { prehash: false, format: "der" })) {return false}
            if (from !== hash160(pubKey).toString("hex")) {return false}
            if (checkMempool && amount > getSpendableBalance(from, msg)) {return false}
            return true
        }
        catch (error) {
            console.log(error)
            return false
        }
    }
    function verifyBlock(block) {
        try {
            let index = block.indexOf(",")
            let header = block.slice(0, index)
            let txs = block.slice(index+1)
            txs = split_(txs)
            let parts = header.split("|")
            if (parts.length !== 4) {return false}
            let [priorHash, merkleRoot, ts, nonce] = parts
            ts = Number(ts)
            if (ts >= Math.round(Date.now()/1000)+60) {return false}
            nonce = Number(nonce)
            if (txs.length === 0) {return false}
            let combined = ""
            for (let i=0; i<txs.length; i++) {
                combined += txs[i]
            }
            if (sha256(Buffer.from(combined, "utf-8")).toString("hex") !== merkleRoot) {return false}
            let t = []
            let from = ""; let txNonce = ""
            for (const tx of txs.slice(1)) {
                let tx_ = tx.split("||")[0]
                if (tx_.startsWith("MSG|")) {
                    [, from, , , txNonce,] = tx_.split("|")
                    if (!verifyMsg(tx, false) || nonceCache.has(`${from}|${txNonce}`)) {return false}
                }
                else {
                    [from, , , txNonce] = tx_.split("|")
                    if (!verifyTx(tx, false) || nonceCache.has(`${from}|${txNonce}`)) {return false}
                }
                for (const [f, n] of t) {
                    if (f === from && n === txNonce) {return false}
                }
                t.push([from, txNonce])
            }
            let tempBalances = {...balancesCache}
            let to = ""; let amount = 0; from = ""
            for (let tx of txs.slice(1)) {
                tx = tx.split("||")[0]
                if (tx.startsWith("MSG|")) {
                    [, from, to, amount, ,] = tx.split("|")
                    amount = 1000
                }
                else {
                    [from, to, amount, ] = tx.split("|")
                    amount = Number(amount)
                }
                if ((tempBalances[from] || 0) < amount) {return false}
                tempBalances[from] = (tempBalances[from] || 0) - amount
                tempBalances[to] = (tempBalances[to] || 0) + amount - getFee(amount)
            }
            let result = BigInt("0x" + sha256(sha256(Buffer.from(`${priorHash}|${merkleRoot}|${ts}|${nonce}`, "utf-8"))).toString("hex"))
            let blockIndex = blocks.length
            if (!txs[0].startsWith("SYSTEM|") || !txs[0].endsWith(`|${getBlockReward(blockIndex)}|0`)) {return false}
            if (blockIndex === 0) {
                if (priorHash !== "0".repeat(64)) {return false}
            }
            else {
                index = blocks[blocks.length-1].indexOf(",")
                let lastHeader = blocks[blocks.length-1].slice(0, index)
                let [lHash, lRoot, lTs, lNonce] = lastHeader.split("|")
                if (Number(lTs) > ts) {return false}
                let expected = BigInt("0x" + sha256(sha256(Buffer.from(`${lHash}|${lRoot}|${Number(lTs)}|${Number(lNonce)}`, "utf-8"))).toString("hex")).toString(16)
                if (priorHash !== expected) {return false}
            }
            if (result > BigInt(getDifficulty(blockIndex))) {return false}
            return true
        }
        catch (error) {
            console.log(error)
            return false
        }
    }

    async function mineLoop() {
        async function broadcastBlock(block) {
            let ids = await getIds()
            for (let i of ids) {
                if (id !== i) {await send(`verifyBlock:${block}`, i)}
            }
        }
        while (true) {
            if (stop) {await sleep(50); continue}
            if (!mine) {await sleep(50); continue}
            if (Date.now() - lastSeen > 5000) {await sleep(50); continue}
            let txs = [...mempool]
            txs.unshift(`SYSTEM|${address}|${getBlockReward(blocks.length)}|0`)

            let nonce = Math.floor(Math.random()*(2**31))
            let counter = 0

            let index = blocks[blocks.length-1].indexOf(",")
            let lastHeader = blocks[blocks.length-1].slice(0, index)
            let [lHash, lRoot, lTs, lNonce] = lastHeader.split("|")
            if (useGpu) {
                const priorHash = BigInt("0x" + sha256(sha256(Buffer.from(`${lHash}|${lRoot}|${Number(lTs)}|${Number(lNonce)}`, "utf-8"))).toString("hex")).toString(16)
                const difficultyHex = getDifficulty(blocks.length).toString(16).padStart(64, "0")
                const difficultyBytes = Buffer.from(difficultyHex, "hex")
                const merkleRoot = sha256(Buffer.from(txs.join(""), "utf-8")).toString("hex")
                const ts = Math.floor(Date.now()/1000)
                const prefix = `${priorHash}|${merkleRoot}|${ts}|`
                const result = await gpuHash(prefix, difficultyBytes, nonce, 2_000_000)
                totalHashes += result.attempts
                if (result.found) {
                    const header = prefix + String(result.nonce)
                    const hash = sha256(sha256(Buffer.from(header, "utf-8")))
                    const block = `${header},${JSON.stringify(txs)}`
                    if (verifyBlock(block)) {
                        mempool = []
                        blocks.push(block)
                        cacheBlock(block)
                        await broadcastBlock(block)
                        totalHashesFound += 1
                    }
                }
            }
            else {
                const priorHash = sha256(sha256(Buffer.from(`${lHash}|${lRoot}|${Number(lTs)}|${Number(lNonce)}`, "utf-8"))).toString("hex")
                const difficultyHex = getDifficulty(blocks.length).toString(16).padStart(64, "0")
                const difficultyBytes = Buffer.from(difficultyHex, "hex")
                const merkleRoot = sha256(Buffer.from(txs.join(""), "utf-8")).toString("hex")
                const ts = Math.floor(Date.now()/1000)
                const prefix = `${priorHash}|${merkleRoot}|${ts}|`
                while (counter < 25000) {
                    counter++
                    const header = prefix + String(nonce+counter)
                    const result = sha256(sha256(Buffer.from(header, "utf-8")))

                    let passed = true
                    for (let i = 0; i < 32; i++) {
                        if (result[i] < difficultyBytes[i]) {break}
                        if (result[i] > difficultyBytes[i]) {passed = false; break}
                    }
                    if (passed) {
                        const block = `${header},${JSON.stringify(txs)}`
                        if (verifyBlock(block)) {
                            mempool = []
                            blocks.push(block)
                            cacheBlock(block)
                            await broadcastBlock(block)
                            totalHashesFound += 1
                            break
                        }
                    }
                }
                totalHashes += counter
                await sleep(0)
            }
        }
    }

    async function check() {
        while (true) {//todo getRecentTxs
            if (stop) {await sleep(50); continue}
            let message = ""; let senderId = 0; let rowId = null;
            try {
                await checkForDisconnect();
                lastSeen = Date.now();
                [message, senderId, rowId] = await read(0.25)
                console.log(Date.now() - lastSeen)
                hashesAtLastSeen = totalHashes
                if (message.startsWith("verifyTx:")) {
                    message = message.slice(9)
                    let result = ""
                    if (message.startsWith("MSG|")) {result = verifyMsg(message)}
                    else {result = verifyTx(message)}
                    if (result && !mempool.includes(message)) {mempool.push(message)}
                }
                else if (message.startsWith("verifyBlock:")) {
                    message = message.slice(12)
                    let result = verifyBlock(message)
                    if (result) {
                        blocks.push(message)
                        cacheBlock(message)
                        mempool = []
                    }
                    else {
                        await send("getBlockCount", senderId)
                        forkCase = true
                    }
                }
                else if (message.startsWith("getMempool")) {
                    await send(`r:getMempool:${JSON.stringify(mempool)}`, senderId)
                }
                else if (message.startsWith("getBlock:")) {
                    let index = message.slice(9)
                    let block = blocks[Number(index)]
                    await send(`r:getBlock:${JSON.stringify(block)}`, senderId)
                }
                else if (message.startsWith("getBlocks")) {
                    await send(`r:getBlocks:${JSON.stringify(blocks)}`, senderId)
                }
                else if (message.startsWith("getBlockCount")) {
                    await send(`r:getBlockCount:${blocks.length}`, senderId)
                }
                else if (message.startsWith("getBalance:")) {
                    let addr = message.slice(11)
                    let [v, unV] = getBalance(addr)
                    await send(`r:getBalance:${v},${unV}`, senderId)
                }
                else if (message.startsWith("getLastBlocks:")) {
                    let amount = Number(message.slice(14))
                    let count = blocks.length
                    await send(`r:getLastBlocks:${blocks.slice(count-amount)}`)
                }
                else if (message.startsWith("getDifficulty")) {
                    await send(`r:getDifficulty:${getDifficulty(blocks.length)}`, senderId)
                }
                else if (message.startsWith("r:getBlockCount:") && forkCase) {
                    try {
                        if (Number(message.slice(16)) > blocks.length) {await send(`getBlocks`, senderId)}
                        else {forkCase = false}
                    }
                    catch (error) {forkCase = false}
                }
                else if (message.startsWith("r:getBlocks:") && forkCase) {
                    let original = blocks
                    let b = split_(message.slice(12))
                    if (b.length < original.length) {
                        forkCase = false
                        continue
                    }
                    difficultyCache = [230]
                    balancesCache = {}
                    nonceCache = new Set()
                    blocks = []
                    let i = -1
                    for (let block of b) {
                        i++
                        if (i === 0) {blocks.push(block); cacheBlock(block); continue}
                        let result = verifyBlock(block)
                        if (!result) {
                            difficultyCache = [230]
                            balancesCache = {}
                            nonceCache = new Set()
                            blocks = original
                            for (let block of blocks) {cacheBlock(block)}
                            break
                        }
                        else {
                            blocks.push(block)
                            cacheBlock(block)
                        }
                    }
                    forkCase = false
                }
            }
            catch (error) {}
            finally {
                if (rowId !== null && rowId !== undefined){
                    await deleteMsg(rowId)
                }
            }
            await sleep(0)
        }
    }

    function setHistory() {
        let t = 0
        for (let tx of mempool) {
            tx = tx.split("||")[0]
            if (tx.startsWith("MSG|")) {
                let [, from, to, , , messageHex] = tx.split("|")
                let bytes = Uint8Array.from(Buffer.from(messageHex, "hex"))
                let messageText = new TextDecoder("utf-8").decode(bytes)
                if (from === address) {addHistoryElement("msg", -1, -1, to); t++}
                if (to === address) {addHistoryElement("msg", -1, 0, from, messageText); t++}
                continue
            }
            let [from, to, amount,] = tx.split("|")
            if (from === address) {addHistoryElement("tx", -1, -1*Number(amount)/1000, parseAddr(to)); t++}
            if (to === address) {addHistoryElement("tx", -1, (Number(amount)-getFee(Number(amount)))/1000, parseAddr(from)); t++}
        }
        let i = -1; let b = blocks.length+1
        for (let block of [...blocks].reverse()) {
            if (t>100) {return}
            i++; b--
            let index = block.indexOf(",")
            let txs = split_(block.slice(index+1))
            for (let tx of txs) {
                if (tx.startsWith("SYSTEM|")) {
                    if (b !== 0) {
                        let parts = tx.split("|")
                        if (parts[1] === address) {addHistoryElement("mined", i, (getBlockReward(b)+getMinerRewards(txs))/1000); t++}
                    }
                    continue
                }
                tx = tx.split("||")[0]
                if (tx.startsWith("MSG|")) {
                    let [, from, to, , , messageHex] = tx.split("|")
                    let bytes = Uint8Array.from(Buffer.from(messageHex, "hex"))
                    let messageText = new TextDecoder("utf-8").decode(bytes)
                    if (from === address) {addHistoryElement("msg", i, -1, parseAddr(to)); t++}
                    if (to === address) {addHistoryElement("msg", i, 0, parseAddr(from), messageText); t++}
                    continue
                }
                let [from, to, amount,] = tx.split("|")
                if (from === address) {addHistoryElement("tx", i, -1*Number(amount)/1000, parseAddr(to)); t++}
                if (to === address) {addHistoryElement("tx", i, (Number(amount)-getFee(Number(amount)))/1000, parseAddr(from)); t++}
            }
        }
    }

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6196ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pickaxe-icon lucide-pickaxe iconH"><path d="m14 13-8.381 8.38a1 1 0 0 1-3.001-3L11 9.999"/><path d="M15.973 4.027A13 13 0 0 0 5.902 2.373c-1.398.342-1.092 2.158.277 2.601a19.9 19.9 0 0 1 5.822 3.024"/><path d="M16.001 11.999a19.9 19.9 0 0 1 3.024 5.824c.444 1.369 2.26 1.676 2.603.278A13 13 0 0 0 20 8.069"/><path d="M18.352 3.352a1.205 1.205 0 0 0-1.704 0l-5.296 5.296a1.205 1.205 0 0 0 0 1.704l2.296 2.296a1.205 1.205 0 0 0 1.704 0l5.296-5.296a1.205 1.205 0 0 0 0-1.704z"/></svg>
                ${time}
                <p class="changeH" style="color: #1dcd20">+${change.toFixed(3)}</p>
                <p class="infoH">Block #${blocks.length - blocksAgo} mined</p>
            </div>
            `
        }
    }
    function removeContact(addr) {
        document.getElementById("contactList").innerHTML = ""
        let contacts = JSON.parse(localStorage.getItem("contacts"))
        let result = []
        for (let contact of contacts) {
            if (contact[0] !== addr) {result.push(contact)}
        }
        localStorage.setItem("contacts", JSON.stringify(result))
        initContacts()
    }
    function addContact() {
        const addr = document.getElementById("contactAddress").value
        const name = document.getElementById("contactName").value
        document.getElementById("contactList").innerHTML += `
            <div class="contactItem">
                <span>${addr}: ${name}</span>
                <button class="btn smallBtn" onclick="removeContact('${addr}')">×</button>
            </div>
        `
        let data = JSON.parse(localStorage.getItem("contacts"))
        data.push([addr, name])
        localStorage.setItem("contacts", JSON.stringify(data))
    }
</script>
</body>
